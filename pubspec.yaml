name: inquadra
description: V1 placeholder app for monument framing experience.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: 2.6.1
  go_router: ^17.1.0
  permission_handler: ^12.0.1
  camera: ^0.12.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  connectivity_plus: ^7.0.0
  cached_network_image: ^3.4.1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true


dependency_overrides:
  riverpod: 2.6.1
